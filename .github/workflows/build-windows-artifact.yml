name: Build Windows Artifact

on:
  workflow_dispatch:
    inputs:
      build_profile:
        description: "Use debug for fastest portable .exe, release for optimized builds."
        required: false
        type: choice
        default: debug
        options:
          - debug
          - release
      bundle_installer:
        description: "Release profile only. Also build the NSIS installer. Slower; portable ZIP does not need this."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  TARGET: x86_64-pc-windows-msvc

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # master
        with:
          toolchain: stable
          targets: ${{ env.TARGET }}

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workdir: ./src-tauri
          shared-key: windows-${{ env.TARGET }}-${{ inputs.build_profile }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate build options
        if: ${{ inputs.build_profile == 'debug' && inputs.bundle_installer }}
        run: |
          Write-Error "bundle_installer requires build_profile=release. Debug mode is portable-only."
          exit 1

      - name: Build frontend
        env:
          NEXT_PUBLIC_TURNSTILE: ${{ secrets.NEXT_PUBLIC_TURNSTILE }}
        run: pnpm exec next build

      - name: Build Tauri app
        env:
          NEXT_PUBLIC_TURNSTILE: ${{ secrets.NEXT_PUBLIC_TURNSTILE }}
          PROFILE: ${{ inputs.build_profile }}
          BUILD_PROFILE: ${{ inputs.build_profile }}
          BUNDLE_INSTALLER: ${{ inputs.bundle_installer }}
        run: |
          $args = @("build", "--target", "${env:TARGET}", "--verbose")

          if ($env:BUILD_PROFILE -eq "debug") {
            $args += @("--debug", "--no-bundle")
          } elseif ($env:BUNDLE_INSTALLER -ne "true") {
            $args += "--no-bundle"
          }

          pnpm tauri @args

      - name: Create portable Windows ZIP
        shell: bash
        env:
          BUILD_PROFILE: ${{ inputs.build_profile }}
        run: |
          PORTABLE_DIR="Donut-Portable"
          mkdir -p "$PORTABLE_DIR"

          cp "src-tauri/target/$TARGET/$BUILD_PROFILE/donutbrowser.exe" "$PORTABLE_DIR/Donut.exe"
          cp "src-tauri/binaries/donut-proxy-$TARGET.exe" "$PORTABLE_DIR/donut-proxy.exe"

          if [ -f "src-tauri/target/$TARGET/$BUILD_PROFILE/donut-daemon.exe" ]; then
            cp "src-tauri/target/$TARGET/$BUILD_PROFILE/donut-daemon.exe" "$PORTABLE_DIR/"
          fi

          if [ -f "src-tauri/target/$TARGET/$BUILD_PROFILE/WebView2Loader.dll" ]; then
            cp "src-tauri/target/$TARGET/$BUILD_PROFILE/WebView2Loader.dll" "$PORTABLE_DIR/"
          fi

          touch "$PORTABLE_DIR/.portable"
          7z a "Donut_x64-portable.zip" "$PORTABLE_DIR"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ inputs.build_profile }}
          if-no-files-found: error
          path: |
            Donut_x64-portable.zip
            src-tauri/target/x86_64-pc-windows-msvc/*/donutbrowser.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
